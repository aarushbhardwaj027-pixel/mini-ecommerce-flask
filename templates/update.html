<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
        }

        .header {
            background-color: #2f3640;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #44bd32;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #4cd137;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            font-weight: bold;
            color: #2f3640;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>UPDATE PRODUCT</h1>
    </div>

    <div class="container">
        <form method="POST">
            
            <label>Product Name</label>
            <input type="text" name="product_name" value="{{ product.product_name }}" required>

            <label>Description</label>
            <textarea name="product_description">{{ product.product_description }}</textarea>

            <label>Price</label>
            <input type="number" name="price" value="{{ product.price }}" required>

            <label>Quantity</label>
            <input type="number" name="quantity" value="{{ product.qty }}" required>

            <button type="submit">UPDATE</button>

        </form>

        <a class="back-link" href="/product">⬅ BACK</a>
    </div>

</body>
</html>
