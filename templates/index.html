<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 0;
        }

        /* Top section */
        .header {
            text-align: center;
            padding: 20px;
            background-color: #2f3640;
            color: white;
        }

        .header a {
            text-decoration: none;
            color: white;
            margin: 0 10px;
            padding: 8px 16px;
            border: 1px solid white;
            border-radius: 5px;
            transition: 0.3s;
        }

        .header a:hover {
            background-color: white;
            color: #2f3640;
        }

        h1 {
            text-align: center;
        }

        /* Product container */
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            width: 280px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0 0 10px 0;
        }

        .card p {
            color: #555;
        }

        .card h4 {
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #44bd32;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #4cd137;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h1>E-COMMERCE APP</h1>
        <p>
            <a href="auth/login">LOG IN</a>
            <a href="auth/signup">SIGN UP</a>
        </p>
    </div>

    <h1>VIEW PRODUCTS</h1>

    <div class="products">
        {% for product in products %}
        <div class="card">
            <h3>{{product.product_name}}</h3>
            <p>{{product.product_description}}</p>
            <h4>₹{{product.price}}</h4>
            <h4>Stock: {{product.qty}}</h4>

            <form method="POST" action="/product/order/{{product.id}}">
                <button type="submit">BUY</button>
            </form>
        </div>
        {% endfor %}
    </div>
    
</body>
</html>
