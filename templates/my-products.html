<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY PRODUCTS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
        }

        .header {
            background-color: #2f3640;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            width: 280px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            color: #555;
        }

        .card h4 {
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .update-btn {
            background-color: #44bd32;
        }

        .update-btn:hover {
            background-color: #4cd137;
        }

        .delete-btn {
            background-color: #e84118;
        }

        .delete-btn:hover {
            background-color: #c23616;
        }

        .back-link {
            display: block;
            text-align: center;
            margin: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #2f3640;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>{{user.username}}'s PRODUCTS</h2>
    </div>

    <div class="products">
        {% for product in my_products %}
        <div class="card">
            <h3>{{product.product_name}}</h3>
            <p>{{product.product_description}}</p>
            <h4>₹{{product.price}}</h4>
            <h4>Stock: {{product.qty}}</h4>

            {% if user.role == "seller" %}
                <form method="GET" action="/product/update/{{product.id}}">
                    <button class="update-btn" type="submit">UPDATE</button>
                </form>
                <form method="POST" action="/product/delete/{{product.id}}">
                    <button class="delete-btn" type="submit">DELETE</button>
                </form>
            {% endif %}
        </div>
        {% endfor %}
    </div>

    <a class="back-link" href="/product">⬅ BACK</a>

</body>
</html>
