<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
        }

        .header {
            background-color: #2f3640;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        h3 {
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #44bd32;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #4cd137;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            display: block;
            margin: 5px 0;
            text-decoration: none;
            color: #2f3640;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>SIGN UP</h2>
    </div>

    <div class="container">
        <form method="POST">
            <h3>ENTER ROLE</h3>
            <select name="choices" id="choices">
                <option value="buyer">BUYER</option>
                <option value="seller">SELLER</option>
            </select>

            <h3>ENTER USERNAME</h3>
            <input type="text" name="username" placeholder="Enter Username" required>

            <h3>ENTER EMAIL</h3>
            <input type="email" name="email" placeholder="Enter email" required>

            <h3>ENTER PASSWORD</h3>
            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">SUBMIT</button>
        </form>

        <div class="links">
            <a href="/">HOME PAGE</a>
        </div>
    </div>

</body>
</html>
