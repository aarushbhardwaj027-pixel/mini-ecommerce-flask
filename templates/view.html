<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIEW PRODUCTS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
        }

        .header {
            background-color: #2f3640;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            width: 280px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            color: #555;
        }

        .card h4 {
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #44bd32;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #4cd137;
        }

        .back-link {
            display: block;
            text-align: center;
            margin: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #2f3640;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VIEW PRODUCTS</h1>
    </div>

    <div class="products">
        {% for product in products %}
        <div class="card">
            <h3>{{product.product_name}}</h3>
            <p>{{product.product_description}}</p>
            <h4>₹{{product.price}}</h4>
            <h4>Stock: {{product.qty}}</h4>

            <form method="POST" action="/product/order/{{product.id}}">
                <button type="submit">PLACE ORDER</button>
            </form>
        </div>
        {% endfor %}
    </div>

    <a class="back-link" href="/product">⬅ BACK</a>
    
</body>
</html>
